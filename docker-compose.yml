version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: carecart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: CARECART
    ports:
      - "3306:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  carecart-app:
    build: .
    container_name: carecart-system
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

  frontend:
    image: node:18
    container_name: carecart-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev
    depends_on:
      - carecart-app
